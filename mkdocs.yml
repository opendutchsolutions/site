site_name: OpenDutchSolutions
theme:
  name: material
  custom_dir: overrides
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.sections
  - navigation.tabs
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.share
  - search.suggest
  - toc.follow
  logo_dark_mode: ODS_thumbnail.svg
  logo_light_mode: ODS_thumbnail_white.svg
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/toggle-switch
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: material/toggle-switch
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: material/toggle-switch-off
      name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/ODS_thumbnail.svg
  # logo intentionally omitted — handled by overrides/partials/logo.html
  # Custom color overrides — place this file at docs/stylesheets/ods.css
extra_css:
- stylesheets/ods.css

# Plugins
plugins:
- blog

markdown_extensions:
- attr_list
- md_in_html
- admonition
- pymdownx.details
- pymdownx.superfences

nav:
- index.md
- Blog:
  - blog/index.md
- Projects:
  - Open source projects:
    - projects/open_source/sanbot/sanbot_hardware_overview.md
- About us:
  - about us/about_us.md
